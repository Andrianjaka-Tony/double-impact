<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Crédits — Double Impact</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Instrument+Serif:ital@0;1&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap"
      rel="stylesheet"
    />

    <style>
      /* ── Reset ─────────────────────────────────────────── */
      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      :root {
        --black: #0a0a0a;
        --white: #fafaf9;
      }

      html,
      body {
        width: 100%;
        min-height: 100vh;
        background: var(--black);
        color: var(--white);
        -webkit-font-smoothing: antialiased;
      }

      body {
        position: relative;
        overflow-x: hidden;
      }

      /* ── FIXED NAV ───────────────────────────── */
      .nav-back {
        position: fixed;
        width: 100vw;
        display: flex;
        justify-content: space-between;
        align-items: center;
        background: var(--black);
        padding: 48px 48px 30px;
        z-index: 100;
      }

      .back-link {
        display: flex;
        align-items: center;
        gap: 8px;
        font-family: "DM Sans", Helvetica, sans-serif;
        font-size: 18px;
        font-weight: bold;
        color: var(--white);
        text-decoration: none;
        cursor: pointer;
        letter-spacing: 0.01em;
      }

      .back-link:hover {
        text-decoration: underline;
        text-underline-offset: 3px;
      }

      .back-arrow {
        font-size: 18px;
      }

      .nav-label {
        position: relative;
        left: -50%;
        transform: translateX(50%);
        font-family: "DM Sans", Helvetica, sans-serif;
        font-size: 14px;
        font-weight: 500;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--white);
      }

      /* ── FIXED FOOTER (bottom-left) ─────────────────────── */
      .footer-insta {
        position: fixed;
        bottom: 28px;
        left: 52px;
        z-index: 100;
        font-family: "DM Sans", Helvetica, sans-serif;
        font-size: 11px;
        font-weight: 400;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--white);
      }

      /* ── SCROLLABLE CONTENT ─────────────────────────────── */
      .content {
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 110px 52px 100px;
        min-height: 100vh;
      }

      /* ── HERO TITLE ─────────────────────────────────────── */
      .hero-title {
        font-family: "DM Serif Display", Georgia, serif;
        font-weight: 400;
        font-style: normal;
        font-size: 30px;
        line-height: 0.95;
        letter-spacing: 0.02em;
        color: var(--white);
        text-align: center;
        margin-bottom: 45px;
      }

      /* ── SECTION ────────────────────────────────────────── */
      .section {
        max-width: 680px;
        width: 100%;
        margin-bottom: 25px;
        text-align: center;
      }

      .section-title {
        
        font-family: "Instrument Serif", Georgia, serif;
        font-size: 14px;
        font-weight: 500;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--white);
        margin-bottom: 24px;
      }

      .section-list {
        font-family: "DM Sans", Helvetica, sans-serif;
        font-style: normal;
        font-size: 12px;
        font-weight: 400;
        line-height: 1.7;
        color: var(--white);
        letter-spacing: 0.01em;
      }

      /* ── IMAGE ──────────────────────────────────────────── */
      .section-image {
        max-width: 266px;
        width: 100%;
        margin: 0 auto 72px;
        transform: rotate(-1.82deg);
      }

      .section-image img {
        width: 100%;
        height: auto;
        display: block;
        border-radius: 2px;
      }

      .img2 {
        transform: rotate(1.82deg);
      }

      /* ── RESPONSIVE ─────────────────────────────────────── */
      @media (max-width: 568px) {
        .back-link span:nth-of-type(2) {
          display: none;
        }
      }
      @media (max-width: 680px) {
        .footer-insta {
          display: none;
        }
      }
    </style>
  </head>
  <body>
    <!-- FIXED NAV -->
    <nav class="nav-back">
      <a href="/index.html" class="back-link">
        <span class="back-arrow">←</span>
        <span>Précédent</span>
      </a>

      <div class="nav-label">Crédits</div>
    </nav>

    <!-- FIXED FOOTER (bottom-left)  -->
    <div class="footer-insta">@doubleimpact.paris</div>

    <!-- SCROLLABLE CONTENT -->
    <main class="content">
      <!-- Hero -->
      <h1 class="hero-title">MERCI À</h1>

      <!-- Direction Artistique -->
      <section class="section">
        <h2 class="section-title">La Direction Artistique</h2>
        <div class="section-list">
          Jeremy Pichard<br />
          Corentin Bahon
        </div>
      </section>

      <!-- Image 1 -->
      <div class="section-image">
        <img
          src="https://images.unsplash.com/photo-1556742044-3c52d6e88c62?w=500&h=650&fit=crop"
          alt="Double Impact card"
        />
      </div>

      <!-- Les Travaux -->
      <section class="section">
        <h2 class="section-title">Les Travaux</h2>
        <div class="section-list">Mon Papa</div>
      </section>

      <!-- Image 2 -->
      <div class="section-image img2">
        <img
          src="https://images.unsplash.com/photo-1556742044-3c52d6e88c62?w=500&h=650&fit=crop"
          alt="Double Impact card"
        />
      </div>
    </main>
  </body>
</html>
