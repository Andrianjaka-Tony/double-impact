<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />

    <title>Double Impact — Chapitres</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Instrument+Serif:ital@0;1&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap"
      rel="stylesheet"
    />

    <style>
      /* ── Reset ─────────────────────────────────────────── */
      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      :root {
        --bg: #f8f7f4;
        --ink: #0c0c0b;
        --rule: #ccc9c2;
        --card-bg: #e8e7e4;
        --px: 52px;
      }

      html,
      body {
        width: 100%;
        min-height: 100vh;
        background: var(--bg);
        color: var(--ink);
        -webkit-font-smoothing: antialiased;
      }

      body {
        display: flex;
        flex-direction: column;
      }

      /* ── PAGE ───────────────────────────────────────────── */
      .page {
        flex: 1;
        display: flex;
        flex-direction: column;
        padding: 0 var(--px);
        min-height: 100vh;
      }

      /* ── HEADER ─────────────────────────────────────────── */
      .header {
        position: fixed;
        width: 100vw;
        display: flex;
        justify-content: space-between;
        align-items: center;
        background-color: var(--bg);
        padding-top: 32px;
        padding-bottom: 32px;
        z-index: 100;
      }

      .back-link {
        display: flex;
        align-items: center;
        gap: 8px;
        font-family: "DM Sans", Helvetica, sans-serif;
        font-size: 18px;
        font-weight: bold;
        color: var(--ink);
        text-decoration: none;
        cursor: pointer;
        letter-spacing: 0.01em;
      }

      .back-link:hover {
        text-decoration: underline;
        text-underline-offset: 3px;
      }

      .back-arrow {
        font-size: 18px;
      }

      .logo {
        position: relative;
        left: -50%;
        transform: translateX(50%);
      }

      .logo img {
        width: clamp(15.3125rem, 9.1938rem + 25.1025vw, 30.625rem);
      }

      /* ── GALLERY GRID ───────────────────────────────────── */
      .gallery {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(318px, 1fr));
        gap: 24px;
        padding-top: 110px;
        padding-bottom: 60px;
      }

      /* ── CARD ───────────────────────────────────────────── */
      .card {
        max-width: 318px;
        display: flex;
        flex-direction: column;
        cursor: pointer;
        transition: transform 0.2s ease;
      }

      .card:hover {
        transform: translateY(-4px);
      }

      /* Image container */
      .card-image {
        width: 100%;
        aspect-ratio: 11 / 16;
        background: var(--card-bg);
        overflow: hidden;
        margin-bottom: 16px;
      }

      .card-image img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      /* Card meta */
      .card-meta {
        display: flex;
        flex-direction: column;
      }

      .card-number {
        font-family: "DM Sans", Helvetica, sans-serif;
        font-size: 14px;
        font-weight: 500;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--ink);
        margin-bottom: 6px;
      }

      .card-title {
        font-family: "DM Serif Display", Georgia, serif;
        font-size: 22px;
        font-weight: 100;
        color: var(--ink);
        letter-spacing: -0.01em;
        margin-bottom: 12px;
      }

      /* Timeline row */
      .card-timeline {
        display: flex;
        align-items: center;
        gap: 0;
      }

      .card-date {
        font-family: "DM Sans", Helvetica, sans-serif;
        font-size: 12px;
        font-weight: 400;
        color: var(--ink);
        letter-spacing: 0.02em;
      }

      .card-arrow {
        display: flex;
        flex: 1;
        margin: 0 12px;
      }

      .card-arrow img {
        width: 100%;
      }

      .card-status {
        font-family: "DM Sans", Helvetica, sans-serif;
        font-style: italic;
        font-size: 12px;
        font-weight: 400;
        color: var(--ink);
        letter-spacing: 0.01em;
      }

      /* ── RESPONSIVE: HORIZONTAL SCROLL ──────────────────── */
      @media (max-width: 768px) {
        .page {
          padding: 0 24px;
        }

        /* Switch to horizontal scroll */
        .gallery {
          flex: auto;
          display: flex;
          flex-wrap: nowrap;
          overflow-x: auto;
          overflow-y: hidden;
          gap: 20px;
          padding-top: 72px;
          padding-bottom: 40px;
          /* Enable momentum scrolling on iOS */
          -webkit-overflow-scrolling: touch;
          /* Hide scrollbar but keep functionality */
          scrollbar-width: none; /* Firefox */
          -ms-overflow-style: none; /* IE/Edge */
        }

        .gallery::-webkit-scrollbar {
          display: none; /* Chrome/Safari */
        }

        .card {
          flex: 0 0 280px;
          max-width: 280px;
        }
      }

      /* ── FOOTER ─────────────────────────────────────────── */
      .footer {
        margin-top: 60px;
        padding-top: 56px;
        padding-bottom: 28px;
        display: flex;
        justify-content: center;
      }

      .footer-insta {
        font-family: "DM Sans", Helvetica, sans-serif;
        font-size: 14px;
        font-weight: 400;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--ink);
        cursor: pointer;
      }

      @media (max-width: 480px) {
        .card {
          flex: 0 0 260px;
          max-width: 260px;
        }

        .header {
          padding-top: 24px;
          padding-bottom: 24px;
        }

        .back-link {
          font-size: 14px;
        }
      }

      @media (max-width: 568px) {
        .back-link span:nth-of-type(2) {
          display: none;
        }
      }
    </style>
  </head>
